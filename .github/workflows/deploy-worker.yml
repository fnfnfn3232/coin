name: Deploy Cloudflare Worker

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "server-auth/**"
      - ".github/workflows/deploy-worker.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write Worker config
        working-directory: server-auth
        run: |
          cat > wrangler.toml <<'EOF'
          name = "coin-board-auth"
          main = "cloudflare-worker.js"
          compatibility_date = "2026-06-12"

          [vars]
          FRONTEND_ORIGIN = "https://fnfnfn3232.github.io"
          NEWS_LIMIT = "40"
          NEWS_STORE_LIMIT = "1000"
          NEWS_CACHE_SECONDS = "600"

          [[durable_objects.bindings]]
          name = "BOARD_STORE"
          class_name = "BoardStore"

          [[r2_buckets]]
          binding = "BOARD_MEDIA_BUCKET"
          bucket_name = "coin-board-media"

          [[migrations]]
          tag = "v1"
          new_sqlite_classes = ["BoardStore"]
          EOF

      - name: Ensure R2 media bucket
        working-directory: server-auth
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@3 r2 bucket create coin-board-media || true

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: server-auth
          secrets: |
            SITE_PASSWORD_SHA256
            SESSION_SECRET
        env:
          SITE_PASSWORD_SHA256: ${{ secrets.SITE_PASSWORD_SHA256 }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
