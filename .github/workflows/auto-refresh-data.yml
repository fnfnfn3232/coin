name: Auto Refresh Data

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/auto-refresh-data.yml"
      - "build_data.py"
      - "mapping.json"
  schedule:
    # UTC minute 기준. 정시/30분 혼잡을 피해서 41분 간격 2회 실행(한국시간 매시 11분, 41분).
    - cron: "11,41 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-refresh-data
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3 4 5; do
            echo "Attempt $attempt: sync with origin/main"
            git fetch origin main
            git checkout -B main origin/main

            echo "Attempt $attempt: rebuild data"
            ok=0
            for build_attempt in 1 2 3; do
              if python build_data.py; then
                ok=1
                break
              fi
              echo "Build failed (attempt $build_attempt), retrying..."
              sleep 4
            done
            if [ "$ok" -ne 1 ]; then
              echo "Build failed after retries"
              exit 1
            fi

            git add data.js board_snapshot.json
            if git diff --cached --quiet; then
              echo "No data changes"
              exit 0
            fi

            git commit -m "chore: auto refresh data"
            if git push origin HEAD:main; then
              echo "Push success on attempt $attempt"
              exit 0
            fi

            echo "Push rejected, retrying..."
            git fetch origin main
            git reset --hard origin/main
            sleep 2
          done

          echo "Failed to push after 5 attempts"
          exit 1
