name: Auto Refresh Data

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/auto-refresh-data.yml"
      - "build_data.py"
      - "mapping.json"
  schedule:
    # Every 10 minutes (UTC)
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-refresh-data
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Rebuild data (retry)
        run: |
          set -e
          for attempt in 1 2 3; do
            if python build_data.py; then
              echo "Build success on attempt $attempt"
              exit 0
            fi
            echo "Build failed on attempt $attempt"
            sleep 4
          done
          echo "Build failed after retries"
          exit 1

      - name: Publish latest data to auto-data branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p _auto_data
          cp data.js board_snapshot.json _auto_data/
          cd _auto_data
          git init -q
          git checkout -B auto-data
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.js board_snapshot.json
          git commit -m "chore: auto refresh data"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin auto-data
