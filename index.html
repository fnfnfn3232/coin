<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exchange Market Cap</title>
  <style>
    :root {
      --bg: #08131b;
      --panel: rgba(9, 22, 31, 0.96);
      --line: rgba(151, 183, 198, 0.16);
      --text: #eef6fa;
      --muted: #96adba;
      --accent: #75ddff;
      --chip: rgba(255, 255, 255, 0.06);
      --shadow: 0 24px 72px rgba(0, 0, 0, 0.3);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--text);
      font-family: "Segoe UI", "Apple SD Gothic Neo", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(38, 133, 159, 0.22), transparent 28%),
        radial-gradient(circle at top right, rgba(242, 188, 86, 0.12), transparent 20%),
        linear-gradient(150deg, #041019 0%, #08131b 38%, #0d2230 100%);
    }

    body.locked {
      overflow: hidden;
    }

    .shell {
      width: min(1360px, calc(100vw - 24px));
      margin: 12px auto 24px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(8, 18, 25, 0.96), rgba(7, 17, 23, 0.98));
      box-shadow: var(--shadow);
    }

    body.locked .shell {
      filter: blur(6px);
      pointer-events: none;
      user-select: none;
    }

    .site-lock {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: rgba(3, 10, 15, 0.72);
      backdrop-filter: blur(3px);
    }

    .site-lock.hidden {
      display: none;
    }

    .lock-card {
      width: min(420px, calc(100vw - 32px));
      border: 1px solid rgba(151, 183, 198, 0.3);
      border-radius: 18px;
      padding: 18px;
      background: rgba(9, 22, 31, 0.96);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
    }

    .lock-title {
      margin: 0 0 8px;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .lock-desc {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .lock-form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .lock-form input {
      width: 100%;
      min-width: 0;
    }

    .lock-error {
      margin-top: 8px;
      min-height: 20px;
      color: #ff9a9a;
      font-size: 13px;
    }

    .lock-ttl-wrap {
      position: fixed;
      top: 10px;
      right: 14px;
      z-index: 4000;
      display: grid;
      gap: 6px;
      justify-items: end;
    }

    .lock-ttl {
      padding: 8px 12px;
      border: 1px solid rgba(117, 221, 255, 0.25);
      border-radius: 999px;
      background: rgba(9, 22, 31, 0.85);
      color: #cce8f3;
      font-size: 12px;
      letter-spacing: 0.01em;
    }

    .lock-extend-btn {
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid rgba(117, 221, 255, 0.25);
      background: rgba(9, 22, 31, 0.85);
      color: #d6edf7;
      font-size: 12px;
      cursor: pointer;
    }

    .lock-extend-btn:hover {
      border-color: rgba(117, 221, 255, 0.45);
      color: #eff9ff;
    }

    .lock-extend-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .panel {
      margin-bottom: 14px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--panel);
    }

    .hero, .controls {
      padding: 18px;
    }

    .eyebrow {
      display: inline-flex;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(117, 221, 255, 0.08);
      color: var(--accent);
      font-size: 13px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    h1 {
      margin: 14px 0 10px;
      font-size: clamp(30px, 5vw, 48px);
      line-height: 1;
      letter-spacing: -0.04em;
      cursor: pointer;
    }

    .title-row {
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      gap: 12px;
      flex-wrap: wrap;
    }

    .title-left {
      min-width: 0;
    }

    .view-switch {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-top: 2px;
    }

    .view-link {
      border: none;
      background: transparent;
      padding: 0;
      color: var(--muted);
      font-size: clamp(22px, 3vw, 28px);
      font-weight: 900;
      letter-spacing: -0.02em;
      cursor: pointer;
      line-height: 1.05;
    }

    .view-link.active {
      color: var(--accent);
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-top: 18px;
    }

    .stat {
      padding: 14px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      background: rgba(255, 255, 255, 0.03);
    }

    .stat-label {
      color: var(--muted);
      font-size: 13px;
    }

      .stat-value {
        margin-top: 8px;
        font-size: 24px;
        font-weight: 800;
        letter-spacing: -0.04em;
      }

      .auto-strip {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 14px;
      }

      .auto-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        border-radius: 999px;
        border: 1px solid rgba(117, 221, 255, 0.18);
        background: rgba(117, 221, 255, 0.06);
        color: var(--text);
        font-size: 13px;
      }

      .manual-refresh-btn {
        cursor: pointer;
        color: #def2fc;
        transition: border-color 0.16s ease, background-color 0.16s ease, color 0.16s ease;
      }

      .manual-refresh-btn:hover:not(:disabled) {
        border-color: rgba(117, 221, 255, 0.35);
        background: rgba(117, 221, 255, 0.1);
        color: #f3fbff;
      }

      .manual-refresh-btn:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .auto-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #57d98c;
        box-shadow: 0 0 10px rgba(87, 217, 140, 0.55);
      }


    .tabs, .row, .pages {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

      button, input, select {
        font: inherit;
        color: var(--text);
        border: 1px solid var(--line);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.04);
      }

      input, select {
        width: min(380px, 100%);
        padding: 12px 14px;
        outline: none;
      }

      select {
        color: var(--text);
        background: rgba(10, 24, 33, 0.96);
      }

      option {
        color: var(--text);
        background: #0b1821;
      }

    button {
      padding: 11px 14px;
      cursor: pointer;
    }

    .tab.active, .page.active {
      background: rgba(117, 221, 255, 0.12);
      border-color: rgba(117, 221, 255, 0.28);
      color: var(--accent);
    }

    .news-toggle.active {
      color: var(--accent);
    }

      .meta {
        justify-content: space-between;
        align-items: center;
        margin-top: 14px;
      }

      .compare-grid {
        display: grid;
        grid-template-columns: minmax(220px, 280px) 52px minmax(220px, 280px);
        gap: 10px;
        margin-top: 14px;
        justify-content: start;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .compare-swap-wrap {
        display: flex;
        align-items: flex-end;
        justify-content: center;
      }

      .compare-swap-btn {
        width: 44px;
        height: 44px;
        padding: 0;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.05);
        color: #d5ebf5;
        font-size: 20px;
        font-weight: 800;
        line-height: 1;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition: border-color 0.16s ease, color 0.16s ease, background-color 0.16s ease;
      }

      .compare-swap-btn:hover:not(:disabled) {
        border-color: rgba(117, 221, 255, 0.38);
        color: #effbff;
        background: rgba(117, 221, 255, 0.12);
      }

      .compare-swap-btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .field label {
        color: var(--muted);
        font-size: 13px;
        font-weight: 600;
      }

      .status {
        color: var(--muted);
        font-size: 14px;
      }

      .table-wrap {
        overflow: auto;
      }

      .news-panel {
        display: block;
        padding: 14px;
        border: 1px solid rgba(151, 183, 198, 0.16);
        border-radius: 16px;
        background: rgba(7, 19, 27, 0.8);
        margin-top: 0;
        min-height: 360px;
      }

      .news-host {
        display: none;
      }

      .shell.news-mode .news-host {
        display: block;
      }

      .shell.news-mode .market-only {
        display: none !important;
      }

      .shell.news-mode .market-section {
        display: none;
      }

      .news-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 10px;
        flex-wrap: wrap;
      }

      .news-head,
      .news-hint,
      .news-meta {
        display: none;
      }

      .news-title {
        font-size: 15px;
        font-weight: 700;
      }

      .news-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .news-link {
        display: inline-flex;
        align-items: center;
        padding: 8px 12px;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.04);
        color: #bfefff;
        text-decoration: none;
        font-size: 13px;
      }

      .news-link:hover {
        border-color: rgba(117, 221, 255, 0.45);
        color: #e9fbff;
      }

      .news-hint {
        color: var(--muted);
        font-size: 13px;
        margin: 0;
      }

      .news-meta {
        color: #8fb4c7;
        font-size: 12px;
        margin: 8px 0 10px;
      }

      .news-text-box {
        border: 1px solid rgba(151, 183, 198, 0.14);
        border-radius: 12px;
        background: #0a1a24;
        overflow: hidden;
      }

      .news-item {
        padding: 12px;
        border-bottom: 1px solid rgba(151, 183, 198, 0.12);
      }

      .news-item:last-child {
        border-bottom: none;
      }

      .news-item-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 6px;
      }

      .news-time {
        font-size: 12px;
        color: #90b5c8;
      }

      .news-item-title {
        margin: 0;
        font-size: 15px;
        color: #e7f4fa;
        font-weight: 700;
      }

      .news-item-body {
        margin: 8px 0 0;
        font-size: 13px;
        color: #c5d8e2;
        line-height: 1.6;
        white-space: pre-wrap;
      }

      .news-item-links {
        margin-top: 8px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .news-item-link {
        display: inline-flex;
        align-items: center;
        padding: 5px 10px;
        border-radius: 999px;
        border: 1px solid rgba(117, 221, 255, 0.28);
        color: #bfefff;
        text-decoration: none;
        font-size: 12px;
      }

      .news-item-link:hover {
        border-color: rgba(117, 221, 255, 0.5);
        color: #e9fbff;
      }

      .news-empty {
        margin: 0;
        padding: 14px;
        font-size: 13px;
        color: var(--muted);
      }

      .news-more-wrap {
        display: flex;
        justify-content: center;
        margin-top: 10px;
      }

      .news-more-btn {
        min-width: 130px;
      }

      .news-more-btn:disabled {
        opacity: 0.7;
        cursor: default;
      }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1320px;
    }

      thead th {
        text-align: left;
        color: var(--muted);
        font-size: 13px;
        font-weight: 600;
        padding: 14px 18px;
        border-bottom: 1px solid var(--line);
      }

      .sortable-th {
        cursor: pointer;
        user-select: none;
      }

      .sortable-th:hover {
        color: var(--text);
      }

      .sort-label {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .sort-arrow {
        font-size: 12px;
        opacity: 0.9;
      }

    tbody td {
      padding: 18px;
      border-bottom: 1px solid rgba(151, 183, 198, 0.14);
      vertical-align: middle;
    }

    tbody tr:hover {
      background: rgba(255, 255, 255, 0.025);
    }

    .rank {
      width: 70px;
      color: var(--muted);
      font-weight: 700;
    }

    .coin-name {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .coin-pair {
      margin-top: 6px;
      color: #b9cbd6;
      font-size: 13px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--chip);
      color: #bbd2dd;
    }

    .cap-main {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .cap-sub {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .price-main {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: #e4f4fa;
    }

    .supply-main {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.015em;
      color: #e4f4fa;
      line-height: 1.55;
    }

    .price-sub,
    .supply-sub {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .source {
      color: #bbd2dd;
      font-size: 13px;
      line-height: 1.5;
    }

    .muted {
      color: var(--muted);
    }

    .empty {
      padding: 60px 20px;
      text-align: center;
      color: var(--muted);
    }

    .footer-note {
      padding: 14px 18px 18px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    @media (max-width: 1200px) {
        .summary {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 900px) {
        .summary {
          grid-template-columns: 1fr;
        }

      }

      @media (max-width: 640px) {
        .shell {
          width: calc(100vw - 12px);
        margin: 6px auto 18px;
        padding: 8px;
        border-radius: 18px;
      }

      .panel, .hero, .controls {
        border-radius: 16px;
      }

        .meta {
          align-items: flex-start;
        }

        input, select {
          width: 100%;
        }

          .compare-grid {
            grid-template-columns: 1fr;
          }

          .compare-swap-wrap {
            align-items: center;
            margin-top: -2px;
          }

          }
    </style>
  </head>
  <body>
  <main class="shell" id="appShell">
    <section class="panel hero">
      <div class="title-row">
        <div class="title-left">
          <span class="eyebrow" id="eyebrow"></span>
          <h1 id="title"></h1>
          <div class="view-switch">
            <button class="view-link" id="newsToggleBtn" type="button"></button>
          </div>
        </div>
      </div>
      <div class="market-only">
        <div class="summary">
          <article class="stat">
            <div class="stat-label" id="statLabelBinance"></div>
            <div class="stat-value" id="statBinance">-</div>
          </article>
          <article class="stat">
            <div class="stat-label" id="statLabelUpbit"></div>
            <div class="stat-value" id="statUpbit">-</div>
          </article>
          <article class="stat">
            <div class="stat-label" id="statLabelBithumb"></div>
            <div class="stat-value" id="statBithumb">-</div>
          </article>
          <article class="stat">
            <div class="stat-label" id="statLabelCoinbase"></div>
            <div class="stat-value" id="statCoinbase">-</div>
          </article>
        </div>
          <div class="auto-strip">
            <div class="auto-pill"><span class="auto-dot"></span><span id="autoUpdateStatus"></span></div>
            <div class="auto-pill" id="lastUpdatedStatus"></div>
            <div class="auto-pill" id="fxRateStatus"></div>
            <button class="auto-pill manual-refresh-btn" id="manualRefreshBtn" type="button">수동 갱신</button>
            <div class="auto-pill" id="manualRefreshHint">수동 갱신 가능</div>
          </div>
        </div>
      </section>

      <section class="panel controls news-host" id="newsSection">
        <div class="news-panel" id="newsPanel"></div>
      </section>

      <section class="panel controls market-section">
        <div class="tabs" id="tabs">
        <button class="tab active" data-board="binance" id="tabBinance"></button>
        <button class="tab" data-board="upbit" id="tabUpbit"></button>
        <button class="tab" data-board="bithumb" id="tabBithumb"></button>
        <button class="tab" data-board="coinbase" id="tabCoinbase"></button>
        <button class="tab" data-board="triple" id="tabTriple"></button>
      </div>
      <div class="compare-grid">
        <div class="field">
          <label for="baseBoardSelect" id="compareBaseLabel"></label>
          <select id="baseBoardSelect">
            <option value="binance"></option>
            <option value="upbit"></option>
            <option value="bithumb"></option>
            <option value="coinbase"></option>
          </select>
        </div>
        <div class="compare-swap-wrap">
          <button class="compare-swap-btn" id="compareSwapBtn" type="button" aria-label="기준/비교 거래소 바꾸기" title="기준/비교 거래소 바꾸기">⇄</button>
        </div>
        <div class="field">
          <label for="compareBoardSelect" id="compareTargetLabel"></label>
          <select id="compareBoardSelect">
            <option value="" id="compareNoneOption"></option>
            <option value="binance"></option>
            <option value="upbit"></option>
            <option value="bithumb"></option>
            <option value="coinbase"></option>
          </select>
        </div>
      </div>
        <div class="row meta">
          <div class="row">
            <input id="searchInput" type="search" />
          </div>
          <div class="status" id="statusText"></div>
        </div>
      </section>

      <section class="panel table-wrap market-section">
        <table>
        <thead>
          <tr>
            <th class="rank" id="thRank"></th>
            <th id="thCoin"></th>
            <th id="thSymbol"></th>
            <th id="thPrice"></th>
            <th id="thCap"></th>
            <th id="thFdv"></th>
            <th id="thSource"></th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      <div class="footer-note" id="footerNote"></div>
    </section>

      <section class="panel controls market-section">
        <div class="pages" id="pagination"></div>
      </section>

  </main>

  <div class="lock-ttl-wrap" id="lockTtlWrap">
    <div class="lock-ttl" id="lockTtl">로그인 유지시간 00시00분</div>
    <button class="lock-extend-btn" id="lockExtendBtn" type="button">연장</button>
  </div>

  <div class="site-lock hidden" id="siteLock">
    <section class="lock-card">
      <h2 class="lock-title">비밀번호 입력</h2>
      <p class="lock-desc">설정된 비밀번호를 입력해야 이 페이지를 볼 수 있습니다.</p>
      <form class="lock-form" id="lockForm">
        <input id="lockPasswordInput" type="password" autocomplete="off" placeholder="비밀번호" />
        <button type="submit" id="lockSubmitBtn">확인</button>
      </form>
      <div class="lock-error" id="lockError"></div>
    </section>
  </div>

  <script src="./data.js"></script>
  <script>
    const SITE_PASSWORD = "";
    const LOCK_AUTH_UNTIL_KEY = "fdv_lock_until_v1";
    const LOCK_EXTEND_COUNT_KEY = "fdv_lock_extend_count_v1";
    const MANUAL_REFRESH_LAST_KEY = "fdv_manual_refresh_last_v1";
    const LOCK_TTL_MS = 24 * 60 * 60 * 1000;
    const LOCK_EXTEND_MAX = 3;
    const MANUAL_REFRESH_COOLDOWN_MS = 30 * 1000;
    const REMOTE_DATA_URL = "https://raw.githubusercontent.com/fnfnfn3232/2026-04-22-spot-usdt/auto-data/data.js";
    const LIVE_MARKET_REFRESH_MS = 10 * 60 * 1000;
    const BOOT_REFRESH_THROTTLE_MS = 20 * 1000;
    const BOOT_REFRESH_LAST_KEY = "fdv_boot_refresh_last_v1";
    const LAST_GOOD_DATA_KEY = "fdv_last_good_data_v1";
    const UPBIT_TICKER_BATCH_SIZE = 100;

    const TEXT = {
      eyebrow: "Exchange Market Cap",

        return isValidBoardPayload(parsed) ? parsed : null;
      } catch (_error) {
        return null;
      }
    }

      if (!isValidBoardPayload(payload)) return;
      try {

        const raw = Number(localStorage.getItem(LOCK_EXTEND_COUNT_KEY));

        return Math.floor(raw);

      function setLockAuthFor24Hours() {
        const until = Date.now() + LOCK_TTL_MS;

      }

      function renderLockExtendButton() {
        const until = getLockAuthUntil();
        const active = until > Date.now();
        const used = getLockExtendCount();
        const remain = Math.max(0, LOCK_EXTEND_MAX - used);

        if (!active) {
          lockExtendBtn.disabled = true;
          lockExtendBtn.textContent = "연장";
          return;
        }

        if (remain <= 0) {
          lockExtendBtn.disabled = true;
          lockExtendBtn.textContent = "연장 0회 남음";
          return;
        }

        lockExtendBtn.disabled = false;
        lockExtendBtn.textContent = `연장 ${remain}회 남음`;
      }

      function formatRemainingLockTime(ms) {
        const remain = Math.max(0, Number(ms) || 0);
        const totalMinutes = Math.max(0, Math.ceil(remain / (60 * 1000)));
        const hours = Math.floor(totalMinutes / 60);
        const minutes = totalMinutes % 60;
        return `${String(hours).padStart(2, "0")}시${String(minutes).padStart(2, "0")}분`;
      }

      function renderLockTtl() {
        const until = getLockAuthUntil();
        const remain = Math.max(0, until - Date.now());
        lockTtl.textContent = `로그인 유지시간 ${formatRemainingLockTime(remain)}`;
        renderLockExtendButton();

      function checkSiteLock() {

    function formatNumber(value, digits = 0) {
      if (!Number.isFinite(value)) return "-";
      return new Intl.NumberFormat("ko-KR", {
        minimumFractionDigits: 0,
        maximumFractionDigits: digits,
      }).format(value);
    }

    function formatUsdShort(value) {
      if (!Number.isFinite(value)) return TEXT.unknown;
      if (value >= 1_000_000_000_000) return `$${formatNumber(value / 1_000_000_000_000, 2)}T`;
      if (value >= 1_000_000_000) return `$${formatNumber(value / 1_000_000_000, 2)}B`;
      if (value >= 1_000_000) return `$${formatNumber(value / 1_000_000, 2)}M`;
      return `$${formatNumber(value, 0)}`;
    }

    function formatKrwShort(value) {
      if (!Number.isFinite(value)) return TEXT.unknown;
      if (value >= 1_0000_0000_0000) {
        const jo = Math.floor(value / 1_0000_0000_0000);
        const eok = Math.floor((value % 1_0000_0000_0000) / 1_0000_0000);
        return eok > 0 ? `${jo}\uC870 ${formatNumber(eok, 0)}\uC5B5\uC6D0` : `${jo}\uC870\uC6D0`;
      }
      if (value >= 1_0000_0000) return `${formatNumber(value / 1_0000_0000, 1)}\uC5B5\uC6D0`;
      if (value >= 1_0000) return `${formatNumber(value / 1_0000, 1)}\uB9CC\uC6D0`;
      return `${formatNumber(value, 0)}\uC6D0`;
    }

    function capDisplay(row) {
      if (row.nativeCurrency === "KRW") {
        return {
          main: formatKrwShort(Number(row.marketCapKrw)),
          sub: formatUsdShort(Number(row.marketCapUsd)),
        };
      }
      return {
        main: formatUsdShort(Number(row.marketCapUsd)),
        sub: formatKrwShort(Number(row.marketCapKrw)),
      };
    }

    function formatUsdPrice(value) {
      if (!Number.isFinite(value)) return TEXT.unknown;
      let digits = 2;
      if (value < 1) digits = 4;
      if (value < 0.01) digits = 8;
      return `$${formatNumber(value, digits)}`;
    }

    function formatKrwPrice(value) {
      if (!Number.isFinite(value)) return TEXT.unknown;
      const digits = value < 1 ? 4 : value < 1000 ? 2 : 0;
      return `${formatNumber(value, digits)}원`;
    }

    function priceDisplay(row) {
      if (row.nativeCurrency === "KRW") {
        return {
          main: formatKrwPrice(Number(row.priceKrw)),
          sub: formatUsdPrice(Number(row.priceUsd)),
        };
      }
      return {
        main: formatUsdPrice(Number(row.priceUsd)),
        sub: formatKrwPrice(Number(row.priceKrw)),
      };
    }

    function formatTokenAmount(value) {
      if (!Number.isFinite(value)) return "-";
      const amount = Math.floor(Math.max(0, value));
      const jo = Math.floor(amount / 1_0000_0000_0000);
      const eok = Math.floor((amount % 1_0000_0000_0000) / 1_0000_0000);
      const man = Math.floor((amount % 1_0000_0000) / 1_0000);

      if (jo > 0) {
        if (eok > 0) return `${formatNumber(jo, 0)}조 ${formatNumber(eok, 0)}억개`;
        return `${formatNumber(jo, 0)}조개`;
      }
      if (eok > 0) {
        if (man > 0) {
          const manText = man % 1000 === 0 ? `${formatNumber(man / 1000, 0)}천` : formatNumber(man, 0);
          return `${formatNumber(eok, 0)}억 ${manText}만개`;
        }
        return `${formatNumber(eok, 0)}억개`;
      }
      if (man > 0) {
        const manText = man % 1000 === 0 ? `${formatNumber(man / 1000, 0)}천` : formatNumber(man, 0);
        return `${manText}만개`;
      }
      return `${formatNumber(amount, 0)}개`;
    }

    function supplyDisplay(row) {
      const fdvUsd = Number(row.fdvUsd);
      const fdvKrw = Number(row.fdvKrw);
      const circulating = Number(row.circulatingSupply);
      const total = Number(row.totalSupply);
      const ratio = Number(row.circulatingRatio);

      let fdvText = TEXT.unknown;
      if (Number.isFinite(fdvKrw)) {
        fdvText = formatKrwShort(fdvKrw);
      } else if (Number.isFinite(fdvUsd)) {
        const fdvKrwFallback = fdvUsd * Number(data.fxUsdKrw || 0);
        fdvText = Number.isFinite(fdvKrwFallback) ? formatKrwShort(fdvKrwFallback) : TEXT.unknown;
      }

      const circulatingText = formatTokenAmount(circulating);
      const totalText = formatTokenAmount(total);
      const ratioText = Number.isFinite(ratio) ? `${formatNumber(ratio * 100, 2)}%` : "-";

      return {
        main: `유통량 ${circulatingText} · 총발행량 ${totalText} · 유통비율 ${ratioText}`,
        sub: `총발행 기준 시총 ${fdvText}`,
      };
    }

      }

      function getComparableSymbol(row) {
        const compareSymbol = String(row?.compareSymbol || "").toUpperCase();
        if (compareSymbol) return compareSymbol;
        return String(row?.symbol || "").toUpperCase();
      }

      function getDisplaySymbol(row) {
        const symbol = String(row?.symbol || "").toUpperCase();
        const aliasOf = String(row?.symbolAliasOf || "").toUpperCase();
        if (aliasOf && aliasOf !== symbol) {
          return `${symbol} (${aliasOf})`;
        }
        return symbol;
      }

      function formatDateTime(timestampSeconds) {
        if (!Number.isFinite(timestampSeconds)) return "-";
        return new Date(timestampSeconds * 1000).toLocaleString("ko-KR");
      }

      function fxSourceLabel(code) {
        const map = {
          upbit_krw_usdt: "업비트 KRW-USDT",
          upbit_krw_usdt_live: "업비트 KRW-USDT",
          bithumb_usdt_krw: "빗썸 USDT/KRW",
          previous_payload: "이전값 유지",
          fallback_default: "기본값",
        };
        return map[String(code || "")] || String(code || "-");
      }

      function renderAutoStatus() {
        const minutes = Number(data.autoRefreshMinutes) || 60;
        const liveMinutes = Math.max(1, Math.floor(LIVE_MARKET_REFRESH_MS / (60 * 1000)));
        const suffix = location.protocol === "file:" ? ` · ${TEXT.fileModeSource}` : "";
        autoUpdateStatus.textContent = `${TEXT.autoUpdateOn} · 서버 ${minutes}분 + 화면 ${liveMinutes}분 보정${suffix}`;
        lastUpdatedStatus.textContent = TEXT.lastUpdated.replace("{time}", formatDateTime(data.generatedAt));
        const fxRate = Number(data.fxUsdKrw);
        const fxRateText = Number.isFinite(fxRate) ? `${formatNumber(fxRate, 2)}원` : "-";
        const fxSourceText = fxSourceLabel(data.fxSource);
        fxRateStatus.textContent = `USDT 환율 ${fxRateText} (${fxSourceText})`;
      }

      function getManualRefreshLastTs() {
        const raw = Number(localStorage.getItem(MANUAL_REFRESH_LAST_KEY));
        return Number.isFinite(raw) ? raw : 0;
      }

      function setManualRefreshLastTs(ts) {
        localStorage.setItem(MANUAL_REFRESH_LAST_KEY, String(Math.max(0, Math.floor(ts))));
      }

      function getBootRefreshLastTs() {
        const raw = Number(localStorage.getItem(BOOT_REFRESH_LAST_KEY));
        return Number.isFinite(raw) ? raw : 0;
      }

      function setBootRefreshLastTs(ts) {
        localStorage.setItem(BOOT_REFRESH_LAST_KEY, String(Math.max(0, Math.floor(ts))));
      }

      function formatRemainingDuration(ms) {
        const remain = Math.max(0, Math.ceil((Number(ms) || 0) / 1000));
        const minutes = Math.floor(remain / 60);
        const seconds = remain % 60;
        if (minutes > 0) return `${minutes}분 ${seconds}초`;
        return `${seconds}초`;
      }

      function toPositiveNumber(value) {
        const number = Number(value);
        return Number.isFinite(number) && number > 0 ? number : null;
      }

      function computeCirculatingRatio(circulating, total) {
        if (!Number.isFinite(circulating) || !Number.isFinite(total) || total <= 0) return null;
        return Math.min(1, Math.max(0, circulating / total));
      }

      function recomputeDerivedFields(row, options = {}) {
        const opts = options || {};
        const preferComputedCap = Boolean(opts.preferComputedCap);
        const fx = toPositiveNumber(data.fxUsdKrw);

        let priceUsd = toPositiveNumber(row.priceUsd);
        let priceKrw = toPositiveNumber(row.priceKrw);
        const circulatingSupply = toPositiveNumber(row.circulatingSupply);
        const totalSupply = toPositiveNumber(row.totalSupply);

        if (priceUsd === null && priceKrw !== null && fx !== null) {
          priceUsd = priceKrw / fx;
        }
        if (priceKrw === null && priceUsd !== null && fx !== null) {
          priceKrw = priceUsd * fx;
        }

        if (priceUsd !== null) row.priceUsd = priceUsd;
        if (priceKrw !== null) row.priceKrw = priceKrw;

        if (circulatingSupply !== null && (priceUsd !== null || priceKrw !== null)) {
          if (preferComputedCap) {
            if (priceUsd !== null) {
              row.marketCapUsd = priceUsd * circulatingSupply;
            } else if (priceKrw !== null && fx !== null) {
              row.marketCapUsd = (priceKrw * circulatingSupply) / fx;
            }
          }
          if (!Number.isFinite(Number(row.marketCapUsd)) && priceUsd !== null) {
            row.marketCapUsd = priceUsd * circulatingSupply;
          }
        }

        if (!Number.isFinite(Number(row.marketCapKrw)) && Number.isFinite(Number(row.marketCapUsd)) && fx !== null) {
          row.marketCapKrw = Number(row.marketCapUsd) * fx;
        }
        if (!Number.isFinite(Number(row.marketCapUsd)) && Number.isFinite(Number(row.marketCapKrw)) && fx !== null) {
          row.marketCapUsd = Number(row.marketCapKrw) / fx;
        }

        if (totalSupply !== null && (priceUsd !== null || priceKrw !== null)) {
          let fdvUsd = null;
          if (priceUsd !== null) {
            fdvUsd = priceUsd * totalSupply;
          } else if (priceKrw !== null && fx !== null) {
            fdvUsd = (priceKrw * totalSupply) / fx;
          }
          if (fdvUsd !== null) {
            row.fdvUsd = fdvUsd;
            if (fx !== null) {
              row.fdvKrw = fdvUsd * fx;
            }
          }
        } else if (!Number.isFinite(Number(row.fdvKrw)) && Number.isFinite(Number(row.fdvUsd)) && fx !== null) {
          row.fdvKrw = Number(row.fdvUsd) * fx;
        }

        row.circulatingRatio = computeCirculatingRatio(circulatingSupply, totalSupply);
        const sortCapUsd = toPositiveNumber(row.marketCapUsd);
        if (sortCapUsd !== null) {
          row.sortCapUsd = sortCapUsd;
        } else if (toPositiveNumber(row.marketCapKrw) !== null && fx !== null) {
          row.sortCapUsd = Number(row.marketCapKrw) / fx;
        } else {
          row.sortCapUsd = null;
        }
      }

      function sortBoardRowsByCap(rows) {
        rows.sort((a, b) => {
          const aCap = toPositiveNumber(a.sortCapUsd);
          const bCap = toPositiveNumber(b.sortCapUsd);
          const aMissing = aCap === null;
          const bMissing = bCap === null;
          if (aMissing && bMissing) {
            return String(a.symbol || "").localeCompare(String(b.symbol || ""));
          }
          if (aMissing) return 1;
          if (bMissing) return -1;
          return bCap - aCap || String(a.symbol || "").localeCompare(String(b.symbol || ""));
        });
      }

      async function fetchJsonNoCache(url) {
        const response = await fetch(url, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`fetch failed: ${response.status} (${url})`);
        }
        return response.json();
      }

      function chunkArray(items, size) {
        const result = [];
        for (let index = 0; index < items.length; index += size) {
          result.push(items.slice(index, index + size));
        }
        return result;
      }

      function recomputeAllRowsUsingCurrentFx() {
        let touched = 0;
        for (const boardName of ["binance", "upbit", "bithumb", "coinbase"]) {
          const rows = data.boards?.[boardName] || [];
          for (const row of rows) {
            recomputeDerivedFields(row, { preferComputedCap: false });
            touched += 1;
          }
          sortBoardRowsByCap(rows);
        }
        return touched;
      }

      async function refreshLiveFxRateFromUpbit() {
        const payload = await fetchJsonNoCache("https://api.upbit.com/v1/ticker?markets=KRW-USDT");
        if (!Array.isArray(payload) || !payload.length) {
          return { changed: false };
        }
        const nextFx = toPositiveNumber(payload[0]?.trade_price);
        if (nextFx === null) {
          return { changed: false };
        }

        const prevFx = toPositiveNumber(data.fxUsdKrw);
        data.fxUsdKrw = nextFx;
        data.fxSource = "upbit_krw_usdt_live";
        return {
          changed: prevFx === null || Math.abs(prevFx - nextFx) >= 0.0001,
        };
      }

      async function refreshBinanceLiveRows() {
        const rows = data.boards?.binance || [];
        if (!rows.length) return 0;

        const payload = await fetchJsonNoCache("https://api.binance.com/api/v3/ticker/price");
        if (!Array.isArray(payload)) return 0;

        const priceMap = new Map();
        for (const item of payload) {
          if (!item || typeof item !== "object") continue;
          const key = String(item.symbol || "").toUpperCase();
          const price = toPositiveNumber(item.price);
          if (!key || price === null) continue;
          priceMap.set(key, price);
        }

        let changed = 0;
        for (const row of rows) {
          const symbol = String(row.symbol || "").toUpperCase();
          if (!symbol) continue;
          const priceUsd = toPositiveNumber(priceMap.get(`${symbol}USDT`));
          if (priceUsd === null) continue;
          row.priceUsd = priceUsd;
          if (toPositiveNumber(data.fxUsdKrw) !== null) {
            row.priceKrw = priceUsd * Number(data.fxUsdKrw);
          }
          recomputeDerivedFields(row, { preferComputedCap: true });
          changed += 1;
        }

        sortBoardRowsByCap(rows);
        return changed;
      }

      async function refreshUpbitLiveRows() {
        const rows = data.boards?.upbit || [];
        if (!rows.length) return 0;

        const marketMap = new Map();
        for (const row of rows) {
          const symbol = String(row.symbol || "").toUpperCase();
          if (!symbol) continue;
          const market = `KRW-${symbol}`;
          if (!marketMap.has(market)) marketMap.set(market, []);
          marketMap.get(market).push(row);
        }

        const markets = Array.from(marketMap.keys());
        if (!markets.length) return 0;
        let changed = 0;

        for (const group of chunkArray(markets, UPBIT_TICKER_BATCH_SIZE)) {
          const query = encodeURIComponent(group.join(","));
          const payload = await fetchJsonNoCache(`https://api.upbit.com/v1/ticker?markets=${query}`);
          if (!Array.isArray(payload)) continue;
          for (const item of payload) {
            const market = String(item?.market || "").toUpperCase();
            const priceKrw = toPositiveNumber(item?.trade_price);
            if (!market || priceKrw === null) continue;
            const targetRows = marketMap.get(market) || [];
            for (const row of targetRows) {
              row.priceKrw = priceKrw;
              if (toPositiveNumber(data.fxUsdKrw) !== null) {
                row.priceUsd = priceKrw / Number(data.fxUsdKrw);
              }
              recomputeDerivedFields(row, { preferComputedCap: true });
              changed += 1;
            }
          }
        }

        sortBoardRowsByCap(rows);
        return changed;
      }

      async function refreshBithumbLiveRows() {
        const rows = data.boards?.bithumb || [];
        if (!rows.length) return 0;

        const [tickerResult, capResult] = await Promise.allSettled([
          fetchJsonNoCache("https://api.bithumb.com/public/ticker/ALL_KRW"),
          fetchJsonNoCache("https://gw.bithumb.com/exchange/v1/trade/coinmarketcap"),
        ]);

        const priceMap = new Map();
        if (tickerResult.status === "fulfilled") {
          const tickerPayload = tickerResult.value;
          const tickerData = tickerPayload && typeof tickerPayload === "object" ? tickerPayload.data : null;
          if (tickerData && typeof tickerData === "object") {
            for (const [symbol, item] of Object.entries(tickerData)) {
              const symbolText = String(symbol || "").toUpperCase();
              if (!symbolText || symbolText === "DATE") continue;
              const price = toPositiveNumber(item?.closing_price);
              if (price === null) continue;
              priceMap.set(symbolText, price);
            }
          }
        }

        const capMap = new Map();
        if (capResult.status === "fulfilled") {
          const capPayload = capResult.value;
          const capData = capPayload && typeof capPayload === "object" ? capPayload.data : null;
          if (capData && typeof capData === "object") {
            for (const [coinType, capValue] of Object.entries(capData)) {
              const cap = toPositiveNumber(capValue);
              if (cap === null) continue;
              capMap.set(String(coinType || "").toUpperCase(), cap);
            }
          }
        }

        let changed = 0;
        for (const row of rows) {
          const symbol = String(row.symbol || "").toUpperCase();
          const coinType = String(row.coinType || "").toUpperCase();
          const priceKrw = toPositiveNumber(priceMap.get(symbol));
          const capKrw = toPositiveNumber(capMap.get(coinType));

          if (priceKrw !== null) {
            row.priceKrw = priceKrw;
            if (toPositiveNumber(data.fxUsdKrw) !== null) {
              row.priceUsd = priceKrw / Number(data.fxUsdKrw);
            }
            changed += 1;
          }

          if (capKrw !== null) {
            row.marketCapKrw = capKrw;
            if (toPositiveNumber(data.fxUsdKrw) !== null) {
              row.marketCapUsd = capKrw / Number(data.fxUsdKrw);
            }
            changed += 1;
          }

          recomputeDerivedFields(row, { preferComputedCap: false });
        }

        sortBoardRowsByCap(rows);
        return changed;
      }

      async function refreshCoinbaseLiveRows() {
        const rows = data.boards?.coinbase || [];
        if (!rows.length) return 0;

        const symbolMaps = [];
        for (const boardName of ["binance", "upbit", "bithumb"]) {
          const map = new Map();
          for (const row of data.boards?.[boardName] || []) {
            const symbol = getComparableSymbol(row);
            if (!symbol || map.has(symbol)) continue;
            map.set(symbol, row);
          }
          symbolMaps.push({ boardName, map });
        }

        let changed = 0;
        for (const row of rows) {
          const symbol = getComparableSymbol(row);
          if (!symbol) continue;

          let ref = null;
          let refBoardName = "";
          for (const source of symbolMaps) {
            const hit = source.map.get(symbol);
            if (hit) {
              ref = hit;
              refBoardName = source.boardName;
              break;
            }
          }
          if (!ref) continue;

          const before = JSON.stringify([
            row.marketCapUsd,
            row.marketCapKrw,
            row.priceUsd,
            row.priceKrw,
            row.circulatingSupply,
            row.totalSupply,
            row.fdvUsd,
            row.fdvKrw,
            row.circulatingRatio,
          ]);

          for (const key of [
            "marketCapUsd",
            "marketCapKrw",
            "priceUsd",
            "priceKrw",
            "circulatingSupply",
            "totalSupply",
            "fdvUsd",
            "fdvKrw",
          ]) {
            const value = toPositiveNumber(ref[key]);
            if (value !== null) {
              row[key] = value;
            }
          }

          const ratioNumber = Number(ref.circulatingRatio);
          if (Number.isFinite(ratioNumber) && ratioNumber >= 0) {
            row.circulatingRatio = ratioNumber;
          }

          row.capSource = "coinbase_fill_same_symbol";
          if (refBoardName === "binance") {
            row.capSourceDetail = "coinbase_exchange_markets|binance_symbol_list";
          } else if (refBoardName === "upbit") {
            row.capSourceDetail = "coinbase_exchange_markets|upbit_info_tab_cmc_first";
          } else {
            row.capSourceDetail = "coinbase_exchange_markets|bithumb_main_today_price";
          }
          row.priceSource = ref.priceSource || row.priceSource;

          recomputeDerivedFields(row, { preferComputedCap: false });
          if (Number.isFinite(Number(row.marketCapUsd)) || Number.isFinite(Number(row.marketCapKrw))) {
            row.status = "ok";
          }

          const after = JSON.stringify([
            row.marketCapUsd,
            row.marketCapKrw,
            row.priceUsd,
            row.priceKrw,
            row.circulatingSupply,
            row.totalSupply,
            row.fdvUsd,
            row.fdvKrw,
            row.circulatingRatio,
          ]);
          if (before !== after) changed += 1;
        }

        sortBoardRowsByCap(rows);
        return changed;
      }

      let liveRefreshInFlight = false;
      async function refreshLiveMarketData() {
        if (liveRefreshInFlight) return { changed: 0 };
        liveRefreshInFlight = true;
        try {
          let changed = 0;
          try {
            const fxResult = await refreshLiveFxRateFromUpbit();
            if (fxResult?.changed) {
              changed += recomputeAllRowsUsingCurrentFx();
            }
          } catch (error) {
            console.error(error);
          }

          const tasks = await Promise.allSettled([
            refreshBinanceLiveRows(),
            refreshUpbitLiveRows(),
            refreshBithumbLiveRows(),
            refreshCoinbaseLiveRows(),
          ]);
          changed += tasks.reduce((sum, item) => {
            if (item.status !== "fulfilled") return sum;
            const count = Number(item.value);
            return sum + (Number.isFinite(count) ? count : 0);
          }, 0);

          if (changed > 0) {
            data.generatedAt = Math.floor(Date.now() / 1000);
            saveLastGoodData(data);
            renderSummaryStats();
            renderAutoStatus();
            render();
          }

          return { changed };
        } finally {
          liveRefreshInFlight = false;
        }
      }

      function getDataSourceCandidates() {
        const ts = Date.now();
        return [`${REMOTE_DATA_URL}?ts=${ts}`, `./data.js?ts=${ts}`];
      }

      async function fetchBoardDataScriptText(url) {
        const response = await fetch(url, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`data.js fetch failed: ${response.status}`);
        }
        return response.text();
      }

      function loadBoardDataViaScript(url) {
        return new Promise((resolve, reject) => {
          const previousPayload = window.BOARD_DATA;
          const script = document.createElement("script");
          script.src = url;
          script.async = true;
          script.onload = () => {
            script.remove();
            const parsed = window.BOARD_DATA;
            if (parsed && parsed.boards) {
              resolve(parsed);
              return;
            }
            window.BOARD_DATA = previousPayload;
            reject(new Error("data.js script parse failed"));
          };
          script.onerror = () => {
            script.remove();
            window.BOARD_DATA = previousPayload;
            reject(new Error("data.js script load failed"));
          };
          document.head.appendChild(script);
        });
      }

      function parseBoardDataScript(scriptText) {
        const marker = "window.BOARD_DATA =";
        const idx = String(scriptText || "").indexOf(marker);
        if (idx < 0) return null;
        const payload = String(scriptText || "").slice(idx + marker.length).trim().replace(/;+\s*$/, "");
        return JSON.parse(payload);
      }

      function renderSummaryStats() {
        statBinance.textContent = `${formatNumber(data.stats.binance?.total || 0, 0)} / ${formatNumber(data.stats.binance?.withCap || 0, 0)}`;
        statUpbit.textContent = `${formatNumber(data.stats.upbit?.total || 0, 0)} / ${formatNumber(data.stats.upbit?.withCap || 0, 0)}`;
        statBithumb.textContent = `${formatNumber(data.stats.bithumb?.total || 0, 0)} / ${formatNumber(data.stats.bithumb?.withCap || 0, 0)}`;
        statCoinbase.textContent = `${formatNumber(data.stats.coinbase?.total || 0, 0)} / ${formatNumber(data.stats.coinbase?.withCap || 0, 0)}`;
      }

      function renderManualRefreshState() {
        const now = Date.now();
        const cooldownEnd = getManualRefreshLastTs() + MANUAL_REFRESH_COOLDOWN_MS;
        const remainMs = cooldownEnd - now;
        if (remainMs > 0) {
          manualRefreshBtn.disabled = true;
          manualRefreshHint.textContent = TEXT.manualRefreshWait.replace("{remain}", formatRemainingDuration(remainMs));
          return;
        }
        manualRefreshBtn.disabled = false;
        if (!manualRefreshHint.textContent || manualRefreshHint.textContent === TEXT.manualRefreshBusy) {
          manualRefreshHint.textContent = TEXT.manualRefreshReady;
        }
      }

      async function fetchLatestBoardData() {
        const beforeGeneratedAt = Number(data.generatedAt) || 0;
        let parsed = null;
        let lastError = null;
        for (const candidate of getDataSourceCandidates()) {
          try {
            let maybeParsed = null;
            try {
              const scriptText = await fetchBoardDataScriptText(candidate);
              maybeParsed = parseBoardDataScript(scriptText);
            } catch (_error) {
              maybeParsed = await loadBoardDataViaScript(candidate);
            }
            if (maybeParsed && maybeParsed.boards) {
              parsed = maybeParsed;
              break;
            }
            lastError = new Error("data.js parse failed");
          } catch (error) {
            lastError = error;
          }
        }

        if (!parsed || !parsed.boards) {
          throw lastError || new Error("data.js load failed");
        }

        data = parsed;
        window.BOARD_DATA = parsed;
        saveLastGoodData(parsed);
        renderSummaryStats();
        renderAutoStatus();
        render();
        return {
          changed: Number(parsed.generatedAt || 0) !== beforeGeneratedAt,
          generatedAt: Number(parsed.generatedAt || 0),
        };
      }

      function setViewMode(mode) {
        state.viewMode = mode === "news" ? "news" : "market";
        const isNewsMode = state.viewMode === "news";
        appShell.classList.toggle("news-mode", isNewsMode);
        newsToggleBtn.classList.toggle("active", isNewsMode);
      }

      function goHomeView() {
        setViewMode("market");
        state.board = "binance";
        state.page = 1;
        state.query = "";
        state.compareBoard = "";
        state.sortDirection = "desc";
        searchInput.value = "";
        baseBoardSelect.value = "binance";
        compareBoardSelect.value = "";
        renderCapHeader();
        render();
      }

      function getBoardRows(board) {
        if (board === "triple") {
          const binanceRows = data.boards?.binance || [];
          const upbitSymbols = new Set(
            (data.boards?.upbit || []).map((item) => getComparableSymbol(item))
          );
          const bithumbSymbols = new Set(
            (data.boards?.bithumb || []).map((item) => getComparableSymbol(item))
          );
          const coinbaseSymbols = new Set(
            (data.boards?.coinbase || []).map((item) => getComparableSymbol(item))
          );

          return binanceRows
            .filter((row) => {
              const symbol = getComparableSymbol(row);
              return Boolean(
                symbol &&
                upbitSymbols.has(symbol) &&
                bithumbSymbols.has(symbol) &&
                coinbaseSymbols.has(symbol)
              );
            })
            .map((row) => {
              const symbol = getComparableSymbol(row);
              return {
                ...row,
                pair: `${symbol}/USDT \u00B7 ${symbol}/KRW \u00B7 ${symbol}/USD`,
                capSource: "quad_listed",
                capSourceDetail: "listed_on_all_four",
              };
            });
        }
        return data.boards?.[board] || [];
      }

      function getCompareSymbolSet(board) {
        const rows = getBoardRows(board);
        return new Set(rows.map((item) => getComparableSymbol(item)));
      }

      function getQueryPriority(row, query) {
        const q = String(query || "").trim().toLowerCase();
        if (!q) return 999;

        const symbol = String(row.symbol || "").toLowerCase();
        const compareSymbol = String(row.compareSymbol || "").toLowerCase();
        const pair = String(row.pair || "").toLowerCase();
        const name = String(row.name || "").toLowerCase();
        const englishName = String(row.englishName || "").toLowerCase();
        const koreanName = String(row.koreanName || "").toLowerCase();

        if (symbol === q) return 0;
        if (compareSymbol && compareSymbol === q) return 1;
        if (pair === q || pair.startsWith(`${q}/`)) return 1;
        if (symbol.startsWith(q)) return 2;
        if (compareSymbol && compareSymbol.startsWith(q)) return 2;
        if (symbol.includes(q)) return 3;
        if (compareSymbol && compareSymbol.includes(q)) return 3;
        if (name.startsWith(q) || englishName.startsWith(q) || koreanName.startsWith(q)) return 4;
        return 5;
      }

        function getRows() {
          const rows = getBoardRows(state.board);
          const compareSymbols = state.compareBoard ? getCompareSymbolSet(state.compareBoard) : null;
          const query = state.query.trim().toLowerCase();
          const compared = state.compareBoard
            ? rows.filter((row) => {
                return compareSymbols.has(getComparableSymbol(row));
              })
            : [...rows];

          const filtered = !query
            ? compared
            : compared.filter((row) => {
                return [
                  row.name,
                  row.symbol,
                  row.compareSymbol,
                  row.symbolAliasOf,
                  row.pair,
                  row.englishName,
                  row.koreanName,
                  row.capSource,
                ]
                  .filter(Boolean)
                .some((value) => String(value).toLowerCase().includes(query));
            });

        return filtered.sort((a, b) => {
          if (query) {
            const aPriority = getQueryPriority(a, query);
            const bPriority = getQueryPriority(b, query);
            if (aPriority !== bPriority) return aPriority - bPriority;
          }

          const aMissing = !Number.isFinite(a.sortCapUsd);
          const bMissing = !Number.isFinite(b.sortCapUsd);

          if (aMissing && bMissing) {
            return String(a.symbol || "").localeCompare(String(b.symbol || ""));
          }
          if (aMissing) return 1;
          if (bMissing) return -1;

          if (state.sortDirection === "asc") {
            return a.sortCapUsd - b.sortCapUsd || String(a.symbol || "").localeCompare(String(b.symbol || ""));
          }

          return b.sortCapUsd - a.sortCapUsd || String(a.symbol || "").localeCompare(String(b.symbol || ""));
        });
      }

    function renderPagination(totalPages) {
      pagination.innerHTML = "";
      if (totalPages <= 1) return;
      for (let page = 1; page <= totalPages; page += 1) {
        const button = document.createElement("button");
        button.className = `page${page === state.page ? " active" : ""}`;
        button.textContent = String(page);
        button.addEventListener("click", () => {
          state.page = page;
          render();
        });
        pagination.appendChild(button);
      }
    }

    function renderTable(rows) {
      if (!rows.length) {
        tableBody.innerHTML = `<tr><td class="empty" colspan="7">${TEXT.empty}</td></tr>`;
        return;
      }

      tableBody.innerHTML = rows
        .map((row, index) => {
          const rank = (state.page - 1) * PAGE_SIZE + index + 1;
          const price = priceDisplay(row);
          const cap = capDisplay(row);
          const supply = supplyDisplay(row);
          const sourceDetailText = sourceDetailLabel(row.capSourceDetail);
          const sourceDetail = sourceDetailText ? `<div class="muted">${sourceDetailText}</div>` : "";
          return `
            <tr>
              <td class="rank">${rank}</td>
              <td>
                <div class="coin-name">${row.name}</div>
                <div class="coin-pair">${row.pair}</div>
              </td>
              <td><span class="chip">${getDisplaySymbol(row)}</span></td>
              <td>
                <div class="price-main">${price.main || TEXT.unknown}</div>
                <div class="price-sub">${price.sub || TEXT.noPrice}</div>
              </td>
              <td>
                <div class="cap-main">${cap.main || TEXT.unknown}</div>
                <div class="cap-sub">${cap.sub || TEXT.noCap}</div>
              </td>
              <td>
                <div class="supply-main">${supply.main || TEXT.unknown}</div>
                <div class="supply-sub">${supply.sub || TEXT.noSupply}</div>
              </td>
              <td class="source">
                <div>${sourceLabel(row.capSource)}</div>
                ${sourceDetail}
              </td>
            </tr>
          `;
        })
        .join("");
    }

      function render() {
        const rows = getRows();
        const totalPages = Math.max(1, Math.ceil(rows.length / PAGE_SIZE));
      if (state.page > totalPages) state.page = 1;
      const start = (state.page - 1) * PAGE_SIZE;
      const pageRows = rows.slice(start, start + PAGE_SIZE);

      renderTable(pageRows);
      renderPagination(totalPages);

        Array.from(tabs.querySelectorAll(".tab")).forEach((button) => {
          button.classList.toggle("active", button.dataset.board === state.board);
        });

        baseBoardSelect.value = state.board === "triple" ? "binance" : state.board;
        compareBoardSelect.value = state.compareBoard === "triple" ? "" : state.compareBoard;
        compareSwapBtn.disabled = !(state.compareBoard && state.compareBoard !== state.board);

        const withCapCount = rows.filter((row) => Number.isFinite(row.sortCapUsd)).length;
        const withPriceCount = rows.filter((row) => Number.isFinite(Number(row.priceUsd)) || Number.isFinite(Number(row.priceKrw))).length;
        const withSupplyCount = rows.filter((row) =>
          Number.isFinite(Number(row.circulatingSupply)) ||
          Number.isFinite(Number(row.totalSupply))
        ).length;
        const totalLabel = state.board === "triple"
          ? `4개 동시상장 ${formatNumber(rows.length, 0)}개`
          : `총 ${formatNumber(rows.length, 0)}개`;
        statusText.textContent = state.compareBoard
          ? `\uACF5\uD1B5 \uC0C1\uC7A5 ${formatNumber(rows.length, 0)}\uAC1C | \uAE30\uC900 ${boardLabel(state.board)} | \uBE44\uAD50 ${boardLabel(state.compareBoard)} | \uC2DC\uCD1D \uD655\uC778 ${formatNumber(withCapCount, 0)}\uAC1C | \uAC00\uACA9 \uD655\uC778 ${formatNumber(withPriceCount, 0)}\uAC1C | \uC720\uD1B5 \uC815\uBCF4 \uD655\uC778 ${formatNumber(withSupplyCount, 0)}\uAC1C | ${state.page} / ${totalPages} \uD398\uC774\uC9C0`
          : `${totalLabel} | \uC2DC\uCD1D \uD655\uC778 ${formatNumber(withCapCount, 0)}\uAC1C | \uAC00\uACA9 \uD655\uC778 ${formatNumber(withPriceCount, 0)}\uAC1C | \uC720\uD1B5 \uC815\uBCF4 \uD655\uC778 ${formatNumber(withSupplyCount, 0)}\uAC1C | ${state.page} / ${totalPages} \uD398\uC774\uC9C0`;

        const generatedAt = data.generatedAt
          ? new Date(data.generatedAt * 1000).toLocaleString("ko-KR")
          : "-";
        footerNote.textContent = TEXT.footer.replace("{time}", generatedAt);
      }

      tabs.addEventListener("click", (event) => {
        const button = event.target.closest("[data-board]");
        if (!button) return;
        setViewMode("market");
        state.board = button.dataset.board;
        state.page = 1;
        render();
      });

      baseBoardSelect.addEventListener("change", (event) => {
        setViewMode("market");
        state.board = event.target.value || "binance";
        state.page = 1;
        render();
      });

      compareBoardSelect.addEventListener("change", (event) => {
        setViewMode("market");
        state.compareBoard = event.target.value || "";
        state.page = 1;
        render();
      });

      compareSwapBtn.addEventListener("click", () => {
        if (!state.compareBoard || state.compareBoard === state.board) return;
        setViewMode("market");
        const currentBase = state.board;
        state.board = state.compareBoard;
        state.compareBoard = currentBase;
        state.page = 1;
        render();
      });

      searchInput.addEventListener("input", (event) => {
        setViewMode("market");
        state.query = event.target.value || "";
        state.page = 1;
        render();
      });

      thCap.addEventListener("click", () => {
        setViewMode("market");
        state.sortDirection = state.sortDirection === "desc" ? "asc" : "desc";
        state.page = 1;
        renderCapHeader();
        render();
      });

      newsToggleBtn.addEventListener("click", () => {
        setViewMode("news");
      });

      titleHeading.addEventListener("click", () => {
        goHomeView();
      });

      manualRefreshBtn.textContent = TEXT.manualRefresh;
      renderSummaryStats();
      renderAutoStatus();
      renderManualRefreshState();
      renderLockTtl();
      setViewMode("market");
      checkSiteLock();

      manualRefreshBtn.addEventListener("click", async () => {
        const now = Date.now();
        const remainMs = getManualRefreshLastTs() + MANUAL_REFRESH_COOLDOWN_MS - now;
        if (remainMs > 0) {
          renderManualRefreshState();
          return;
        }
        manualRefreshBtn.disabled = true;
        manualRefreshBtn.textContent = TEXT.manualRefreshBusy;
        manualRefreshHint.textContent = TEXT.manualRefreshBusy;
        try {
          let anySuccess = false;
          let changed = false;

          try {
            const fileResult = await fetchLatestBoardData();
            anySuccess = true;
            changed = changed || Boolean(fileResult && fileResult.changed);
          } catch (error) {
            console.error(error);
          }

          try {
            const liveResult = await refreshLiveMarketData();
            anySuccess = true;
            changed = changed || Number(liveResult?.changed || 0) > 0;
          } catch (error) {
            console.error(error);
          }

          if (!anySuccess) {
            throw new Error("manual refresh failed");
          }

          const doneAt = Date.now();
          setManualRefreshLastTs(doneAt);
          const doneText = new Date(doneAt).toLocaleTimeString("ko-KR");
          manualRefreshHint.textContent = (changed ? TEXT.manualRefreshDone : TEXT.manualRefreshUnchanged).replace(
            "{time}",
            doneText
          );
        } catch (error) {
          console.error(error);
          manualRefreshHint.textContent = TEXT.manualRefreshFailed;
        } finally {
          manualRefreshBtn.textContent = TEXT.manualRefresh;
          renderManualRefreshState();
        }
      });

      let autoRefreshInFlight = false;
      let bootRefreshTimer = null;
      async function runAutoRefreshTick(mode = "interval") {
        if (autoRefreshInFlight) return;
        if (mode === "boot") {
          const now = Date.now();
          const remainMs = BOOT_REFRESH_THROTTLE_MS - (now - getBootRefreshLastTs());
          if (remainMs > 0) {
            if (bootRefreshTimer) {
              window.clearTimeout(bootRefreshTimer);
            }
            bootRefreshTimer = window.setTimeout(() => {
              bootRefreshTimer = null;
              runAutoRefreshTick("boot-delayed");
            }, remainMs);
            return;
          }
        }
        autoRefreshInFlight = true;
        let refreshed = false;
        try {
          try {
            await fetchLatestBoardData();
            refreshed = true;
          } catch (error) {
            console.error(error);
          }
          try {
            await refreshLiveMarketData();
            refreshed = true;
          } catch (error) {
            console.error(error);
          }
        } catch (error) {
          console.error(error);
        } finally {
          if (refreshed && (mode === "boot" || mode === "boot-delayed")) {
            setBootRefreshLastTs(Date.now());
          }
          autoRefreshInFlight = false;
        }
      }

      window.setInterval(() => {
        renderLockTtl();
        renderManualRefreshState();
        const until = getLockAuthUntil();
        if (until <= Date.now() && !document.body.classList.contains("locked")) {
          checkSiteLock();
        }
      }, 1000);
      const autoRefreshMinutes = Math.max(1, Number(data.autoRefreshMinutes) || 60);
      const autoRefreshMs = Math.min(autoRefreshMinutes * 60 * 1000, LIVE_MARKET_REFRESH_MS);
      runAutoRefreshTick("boot");
      window.setInterval(() => {
        runAutoRefreshTick("interval");
      }, autoRefreshMs);
      render();
    </script>
  </body>
  </html>
